<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Redaktor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --a4-width: 210mm;
            --a4-height: 297mm;
        }
        body {
            background-color: #f0f2f5;
            overflow-x: hidden;
        }
        #document-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
        }
        .page-container {
            width: var(--a4-width);
            min-height: var(--a4-height);
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            position: relative;
            padding: 20mm;
        }
        .element-wrapper {
            position: absolute;
            cursor: move;
            border: 1px solid transparent;
            padding: 5px;
            user-select: none;
        }
        .element-wrapper:hover, .element-wrapper.active {
            border: 1px dashed #3b82f6;
        }
        .toolbar-inline {
            position: absolute;
            top: -45px;
            left: 0;
            background: #1e293b;
            border-radius: 6px;
            padding: 5px 10px;
            display: none;
            gap: 8px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .element-wrapper:hover .toolbar-inline, .element-wrapper.active .toolbar-inline {
            display: flex;
        }
        .resize-handle {
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border: 2px solid white;
            position: absolute;
            bottom: -6px;
            right: -6px;
            cursor: nwse-resize;
            border-radius: 50%;
            display: none;
        }
        .element-wrapper:hover .resize-handle, .element-wrapper.active .resize-handle {
            display: block;
        }
        .page-label {
            position: absolute;
            left: -60px;
            top: 20px;
            background: #94a3b8;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        @media print {
            .no-print { display: none !important; }
            .page-container { margin: 0; box-shadow: none; }
            body { background: white; }
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Ana Menu -->
    <nav class="no-print bg-white border-b border-slate-200 p-3 sticky top-0 z-[1000] flex items-center justify-between shadow-sm px-10">
        <div class="flex items-center gap-6">
            <div class="bg-blue-600 text-white p-2 rounded shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <div class="flex gap-2">
                <button onclick="addElement('text')" class="flex items-center gap-2 hover:bg-slate-100 px-4 py-2 rounded-md transition">
                    <span class="text-xl">T</span> Mətn
                </button>
                <button onclick="document.getElementById('imgInput').click()" class="flex items-center gap-2 hover:bg-slate-100 px-4 py-2 rounded-md transition">
                    <span>🖼️</span> Şəkil
                </button>
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="handleImage(event)">
            </div>
            <div class="h-8 w-[1px] bg-slate-200"></div>
            <button onclick="addNewPage()" class="flex items-center gap-2 text-purple-600 hover:bg-purple-50 px-4 py-2 rounded-md transition font-medium">
                📄 Yeni Səhifə
            </button>
        </div>

        <button onclick="downloadPDF()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-full font-bold shadow-lg transition flex items-center gap-2">
            💾 PDF Yüklə
        </button>
    </nav>

    <div id="document-content">
        <!-- İlk Səhifə -->
        <div class="page-container" id="page-1">
            <span class="page-label no-print">Səhifə 1</span>
            <div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none select-none">
                <h1 class="text-6xl font-black rotate-45 border-8 border-slate-900 p-10">DRAFT</h1>
            </div>
        </div>
    </div>

    <script>
        let pageCount = 1;
        let lastSelectedPage = document.getElementById('page-1');
        let activeEl = null;

        // Səhifə seçimi
        document.addEventListener('mousedown', (e) => {
            const page = e.target.closest('.page-container');
            if (page) lastSelectedPage = page;
            
            const wrapper = e.target.closest('.element-wrapper');
            if (activeEl) activeEl.classList.remove('active');
            if (wrapper) {
                activeEl = wrapper;
                activeEl.classList.add('active');
            }
        });

        function addNewPage() {
            pageCount++;
            const newPage = document.createElement('div');
            newPage.className = 'page-container';
            newPage.id = `page-${pageCount}`;
            newPage.innerHTML = `<span class="page-label no-print">Səhifə ${pageCount}</span>`;
            document.getElementById('document-content').appendChild(newPage);
            lastSelectedPage = newPage;
            newPage.scrollIntoView({ behavior: 'smooth' });
        }

        function addElement(type, data = null) {
            const wrapper = document.createElement('div');
            wrapper.className = 'element-wrapper';
            wrapper.style.left = '50px';
            wrapper.style.top = '100px';

            const toolbar = document.createElement('div');
            toolbar.className = 'toolbar-inline no-print';
            
            let content;
            if (type === 'text') {
                toolbar.innerHTML = `
                    <button onclick="format('bold')" class="text-white px-2 hover:bg-slate-700 rounded font-bold">B</button>
                    <button onclick="format('italic')" class="text-white px-2 hover:bg-slate-700 rounded italic">I</button>
                    <button onclick="updateSize(2)" class="text-white px-2 hover:bg-slate-700 rounded">A+</button>
                    <button onclick="updateSize(-2)" class="text-white px-2 hover:bg-slate-700 rounded">A-</button>
                    <input type="color" onchange="updateColor(this)" class="w-6 h-6 bg-transparent border-none cursor-pointer">
                    <button onclick="this.closest('.element-wrapper').remove()" class="text-red-400 px-2 hover:bg-slate-700 rounded ml-2">🗑️</button>
                `;
                content = document.createElement('div');
                content.contentEditable = true;
                content.innerText = 'Bura klikləyib yazın...';
                content.style.fontSize = '18px';
                content.style.minWidth = '150px';
                content.style.outline = 'none';
                content.className = 'text-content';
            } else {
                toolbar.innerHTML = `<button onclick="this.closest('.element-wrapper').remove()" class="text-red-400 px-2 hover:bg-slate-700 rounded">🗑️ Sil</button>`;
                content = document.createElement('img');
                content.src = data;
                content.className = 'w-full h-auto pointer-events-none';
                wrapper.style.width = '200px';
            }

            const handle = document.createElement('div');
            handle.className = 'resize-handle no-print';

            wrapper.appendChild(toolbar);
            wrapper.appendChild(content);
            wrapper.appendChild(handle);
            
            initDragAndResize(wrapper);
            lastSelectedPage.appendChild(wrapper);
        }

        function handleImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => addElement('image', ev.target.result);
                reader.readAsDataURL(file);
            }
        }

        // Format funksiyaları
        function format(cmd) {
            document.execCommand(cmd, false, null);
        }

        function updateSize(delta) {
            if (!activeEl) return;
            const textEl = activeEl.querySelector('.text-content');
            if (textEl) {
                const current = parseInt(window.getComputedStyle(textEl).fontSize);
                textEl.style.fontSize = (current + delta) + 'px';
            }
        }

        function updateColor(input) {
            if (!activeEl) return;
            const textEl = activeEl.querySelector('.text-content');
            if (textEl) textEl.style.color = input.value;
        }

        // Draggable & Resizable Məntiqi (YENİLƏNİB)
        function initDragAndResize(el) {
            let isDragging = false;
            let isResizing = false;
            let startX, startY, startW, startH, startLeft, startTop;

            el.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('resize-handle')) {
                    isResizing = true;
                    e.preventDefault();
                } else if (e.target.contentEditable !== 'true' && e.target.tagName !== 'BUTTON') {
                    isDragging = true;
                } else {
                    return;
                }

                startX = e.clientX;
                startY = e.clientY;
                startW = el.offsetWidth;
                startH = el.offsetHeight;
                startLeft = el.offsetLeft;
                startTop = el.offsetTop;

                const moveHandler = (me) => {
                    const dx = me.clientX - startX;
                    const dy = me.clientY - startY;

                    if (isResizing) {
                        el.style.width = Math.max(50, startW + dx) + 'px';
                    } else if (isDragging) {
                        el.style.left = (startLeft + dx) + 'px';
                        el.style.top = (startTop + dy) + 'px';
                    }
                };

                const upHandler = () => {
                    isDragging = false;
                    isResizing = false;
                    window.removeEventListener('mousemove', moveHandler);
                    window.removeEventListener('mouseup', upHandler);
                };

                window.addEventListener('mousemove', moveHandler);
                window.addEventListener('mouseup', upHandler);
            });
        }

        async function downloadPDF() {
            // Aktiv seleksiyanı təmizlə
            if (activeEl) activeEl.classList.remove('active');
            
            const element = document.getElementById('document-content');
            const opt = {
                margin: 0,
                filename: 'senet.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] }
            };

            const pages = document.querySelectorAll('.page-container');
            pages.forEach((p, i) => { if(i > 0) p.style.pageBreakBefore = 'always'; });

            try {
                await html2pdf().set(opt).from(element).save();
            } finally {
                pages.forEach(p => p.style.pageBreakBefore = 'auto');
            }
        }
    </script>
</body>
</html>
