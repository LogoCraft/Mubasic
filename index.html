<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Redaktor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --a4-width: 210mm;
            --a4-height: 297mm;
        }
        body {
            background-color: #f0f2f5;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        #document-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }
        .page-container {
            width: var(--a4-width);
            height: var(--a4-height);
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            position: relative;
            padding: 0;
            border: 1px solid transparent;
            transition: all 0.3s;
            overflow: hidden;
            box-sizing: border-box;
        }
        .page-container.active-page {
            border: 2px solid #3b82f6;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.2);
        }
        .element-wrapper {
            position: absolute;
            cursor: move;
            border: 1px solid transparent;
            padding: 5px;
            z-index: 10;
            box-sizing: border-box;
        }
        .element-wrapper:hover, .element-wrapper.active {
            border: 1px dashed #3b82f6;
            background: rgba(59, 130, 246, 0.02);
        }
        .toolbar-inline {
            position: absolute;
            top: -45px;
            left: 0;
            background: #1e293b;
            border-radius: 6px;
            padding: 5px 10px;
            display: none;
            gap: 8px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .element-wrapper:hover .toolbar-inline, .element-wrapper.active .toolbar-inline {
            display: flex;
        }
        .resize-handle {
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border: 2px solid white;
            position: absolute;
            bottom: -6px;
            right: -6px;
            cursor: nwse-resize;
            border-radius: 50%;
            display: none;
        }
        .element-wrapper:hover .resize-handle, .element-wrapper.active .resize-handle {
            display: block;
        }
        .page-label {
            position: absolute;
            left: -80px;
            top: 10px;
            background: #64748b;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }
        @media print {
            .no-print { display: none !important; }
            #document-content { padding: 0; margin: 0; }
            .page-container { margin: 0; box-shadow: none; border: none; }
        }
    </style>
</head>
<body class="text-slate-800">

    <nav class="no-print bg-white border-b border-slate-200 p-3 sticky top-0 z-[1000] flex items-center justify-between shadow-sm px-10">
        <div class="flex items-center gap-6">
            <div class="bg-blue-600 text-white p-2 rounded shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <div class="flex gap-1">
                <button onclick="addElement('text')" class="flex items-center gap-2 hover:bg-blue-50 text-blue-700 px-4 py-2 rounded-md transition font-medium">
                    <span class="text-xl font-bold">T</span> Mətn Əlavə Et
                </button>
                <button onclick="document.getElementById('imgInput').click()" class="flex items-center gap-2 hover:bg-emerald-50 text-emerald-700 px-4 py-2 rounded-md transition font-medium">
                    <span>🖼️</span> Şəkil Seç
                </button>
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="handleImage(event)">
            </div>
            <div class="h-8 w-[1px] bg-slate-200"></div>
            <button onclick="addNewPage()" class="flex items-center gap-2 text-purple-600 hover:bg-purple-50 px-4 py-2 rounded-md transition font-semibold">
                📄 + Yeni Səhifə
            </button>
        </div>

        <div class="flex items-center gap-4">
            <span id="active-page-status" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Səhifə 1 aktivdir</span>
            <button onclick="downloadPDF()" id="downloadBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-full font-bold shadow-lg transition flex items-center gap-2">
                💾 PDF Yüklə
            </button>
        </div>
    </nav>

    <div id="document-content">
        <div class="page-container active-page" id="page-1" onclick="selectPage(this)">
            <span class="page-label no-print">Səhifə 1</span>
        </div>
    </div>

    <script>
        let pageCount = 1;
        let lastSelectedPage = document.getElementById('page-1');
        let activeEl = null;

        function selectPage(pageEl) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page'));
            pageEl.classList.add('active-page');
            lastSelectedPage = pageEl;
            document.getElementById('active-page-status').innerText = `Səhifə ${pageEl.id.split('-')[1]} aktivdir`;
        }

        document.addEventListener('mousedown', (e) => {
            const wrapper = e.target.closest('.element-wrapper');
            if (activeEl && !e.target.closest('.toolbar-inline')) activeEl.classList.remove('active');
            if (wrapper) {
                activeEl = wrapper;
                activeEl.classList.add('active');
            }
        });

        function addNewPage() {
            pageCount++;
            const newPage = document.createElement('div');
            newPage.className = 'page-container';
            newPage.id = `page-${pageCount}`;
            newPage.onclick = function(e) { 
                if(e.target === this) selectPage(this); 
            };
            newPage.innerHTML = `<span class="page-label no-print">Səhifə ${pageCount}</span>`;
            document.getElementById('document-content').appendChild(newPage);
            selectPage(newPage);
            newPage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function addElement(type, data = null) {
            const wrapper = document.createElement('div');
            wrapper.className = 'element-wrapper active';
            wrapper.style.left = '40mm';
            wrapper.style.top = '40mm';

            const toolbar = document.createElement('div');
            toolbar.className = 'toolbar-inline no-print';
            
            let content;
            if (type === 'text') {
                toolbar.innerHTML = `
                    <button onclick="format('bold')" class="text-white px-2 hover:bg-slate-700 rounded font-bold">B</button>
                    <button onclick="format('italic')" class="text-white px-2 hover:bg-slate-700 rounded italic">I</button>
                    <button onclick="updateSize(2)" class="text-white px-2 hover:bg-slate-700 rounded text-lg">A+</button>
                    <button onclick="updateSize(-2)" class="text-white px-2 hover:bg-slate-700 rounded text-sm">A-</button>
                    <input type="color" onchange="updateColor(this)" class="w-6 h-6 bg-transparent border-none cursor-pointer">
                    <div class="w-[1px] h-4 bg-slate-600 mx-1"></div>
                    <button onclick="this.closest('.element-wrapper').remove()" class="text-red-400 px-2 hover:bg-slate-700 rounded">🗑️</button>
                `;
                content = document.createElement('div');
                content.contentEditable = true;
                content.innerText = 'Mətni bura yazın...';
                content.style.fontSize = '20px';
                content.style.minWidth = '180px';
                content.style.outline = 'none';
                content.className = 'text-content';
            } else {
                toolbar.innerHTML = `<button onclick="this.closest('.element-wrapper').remove()" class="text-red-400 px-2 hover:bg-slate-700 rounded">🗑️ Şəkli Sil</button>`;
                content = document.createElement('img');
                content.src = data;
                content.className = 'w-full h-auto pointer-events-none select-none';
                wrapper.style.width = '250px';
            }

            const handle = document.createElement('div');
            handle.className = 'resize-handle no-print';

            wrapper.appendChild(toolbar);
            wrapper.appendChild(content);
            wrapper.appendChild(handle);
            
            if (activeEl) activeEl.classList.remove('active');
            activeEl = wrapper;
            
            initDragAndResize(wrapper);
            lastSelectedPage.appendChild(wrapper);
            
            if(type === 'text') {
                setTimeout(() => content.focus(), 10);
            }
        }

        function handleImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => addElement('image', ev.target.result);
                reader.readAsDataURL(file);
                e.target.value = '';
            }
        }

        function format(cmd) { document.execCommand(cmd, false, null); }

        function updateSize(delta) {
            if (!activeEl) return;
            const textEl = activeEl.querySelector('.text-content');
            if (textEl) {
                const current = parseInt(window.getComputedStyle(textEl).fontSize);
                textEl.style.fontSize = (current + delta) + 'px';
            }
        }

        function updateColor(input) {
            if (!activeEl) return;
            const textEl = activeEl.querySelector('.text-content');
            if (textEl) textEl.style.color = input.value;
        }

        function initDragAndResize(el) {
            let isDragging = false;
            let isResizing = false;
            let startX, startY, startW, startH, startLeft, startTop;

            el.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('resize-handle')) {
                    isResizing = true;
                    e.preventDefault();
                } else if (e.target.contentEditable !== 'true' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                    isDragging = true;
                    selectPage(el.parentElement);
                } else { return; }

                startX = e.clientX; startY = e.clientY;
                startW = el.offsetWidth; startH = el.offsetHeight;
                startLeft = el.offsetLeft; startTop = el.offsetTop;

                const moveHandler = (me) => {
                    const dx = me.clientX - startX;
                    const dy = me.clientY - startY;
                    if (isResizing) {
                        el.style.width = Math.max(50, startW + dx) + 'px';
                    } else if (isDragging) {
                        el.style.left = (startLeft + dx) + 'px';
                        el.style.top = (startTop + dy) + 'px';
                    }
                };

                const upHandler = () => {
                    isDragging = false; isResizing = false;
                    window.removeEventListener('mousemove', moveHandler);
                    window.removeEventListener('mouseup', upHandler);
                };

                window.addEventListener('mousemove', moveHandler);
                window.addEventListener('mouseup', upHandler);
            });
        }

        async function downloadPDF() {
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerText;
            btn.innerText = "Hazırlanır...";
            btn.disabled = true;

            if (activeEl) activeEl.classList.remove('active');
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page'));
            
            const pages = document.querySelectorAll('.page-container');
            
            // html2pdf-in səhifələri avtomatik bölməsi yerinə hər səhifəni dəqiq kəsən tənzimləmə
            const opt = {
                margin: 0,
                filename: 'senet_redakte.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true,
                    letterRendering: true,
                    scrollY: 0,
                    windowWidth: document.documentElement.offsetWidth
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] } // CSS kəsimlərinə önəm ver
            };

            // Hər səhifə konteynerinə PDF kəsimi əlavə et
            pages.forEach((p) => {
                p.style.margin = '0';
                p.style.pageBreakAfter = 'always';
            });

            try {
                // html2pdf obyekti yaradılır
                const worker = html2pdf().set(opt).from(document.getElementById('document-content'));
                await worker.save();
            } catch (error) {
                console.error("PDF yaratma xətası:", error);
            } finally {
                // Səhifə stillərini ekranda görünməsi üçün bərpa et
                pages.forEach(p => {
                    p.style.margin = '0 0 20px 0';
                    p.style.pageBreakAfter = 'auto';
                });
                if(lastSelectedPage) lastSelectedPage.classList.add('active-page');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
